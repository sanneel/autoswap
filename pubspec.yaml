name: swapride
description: SwapRide — a car-swap marketplace MVP.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.6

  # Payments — RevenueCat. 6.x uses Flutter v1 embedding (removed in 3.27+); 10.x is current.
  purchases_flutter: ^10.2.0

  # Notifications
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.3

  # UI / utilities
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  uuid: ^4.4.0

  # Logging / errors
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
